name: CloudMicApp
options:
  bundleIdPrefix: com.antigravity
targets:
  CloudMicApp:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: CloudMicApp
    settings:
      base:
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        GENERATE_INFOPLIST_FILE: "YES"
        PRODUCT_BUNDLE_IDENTIFIER: com.antigravity.CloudMicApp
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_TEAM: ""
        SWIFT_VERSION: "5.7"
        SDKROOT: iphoneos
        TARGETED_DEVICE_FAMILY: "1" # iPhone only (or "1,2" for iPhone/iPad)
